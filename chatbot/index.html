<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Campus Info AI Agent</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Header with logo and college name -->
      <header class="app-header">
        <div class="logo-wrapper">
          <!-- Update the src if your logo file name changes -->
          <img
            src="../assets/ku-college-logo.png"
            alt="Kakatiya University College of Engineering and Technology Logo"
            class="logo-img"
          />
        </div>
        <div class="title-wrapper">
          <h1>Kakatiya University College of Engineering and Technology</h1>
          <p class="subtitle">Interactive Campus Info AI Agent</p>
        </div>
      </header>

      <!-- Chat area -->
      <main class="chat-container">
        <div id="chat-window" class="chat-window" aria-live="polite"></div>

        <form id="chat-form" class="chat-input-row">
          <input
            id="user-input"
            type="text"
            placeholder="Ask about admissions, departments, facilities, campus life..."
            autocomplete="off"
            required
          />
          <button type="submit" id="send-btn">Send</button>
        </form>

        <p class="hint">
          This is a prototype. Answers are generated by an AI model and may not be fully accurate.
        </p>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
